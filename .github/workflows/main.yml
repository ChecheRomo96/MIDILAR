name: Deploy Documentation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build_and_deploy_docs:
    name: Build and Deploy Documentation
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout the repository
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Install Dependencies
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          graphviz \
          doxygen

    # Step 3: Configure and Build the Documentation
    - name: Configure and Generate Documentation with CMake
      run: |
        cmake -S . -B build -G "Ninja" -DMIDILAR_DOCS=ON -DMIDILAR_EXAMPLES=ON -DMIDILAR_TESTING=ON 
        cmake --build build --target docs

    # Step 4: Deploy Documentation to GitHub Pages
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: build/doxygen/html
